<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Access · RemarkHub</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #04050a;
    --surface:   #090d14;
    --card:      #0d1520;
    --accent:    #3db8a8;
    --accent2:   #00e5c8;
    --gold:      #c9a84c;
    --gold2:     #e8c97a;
    --text:      #d0dde8;
    --muted:     #4a6070;
    --danger:    #f87171;
    --border:    rgba(61,184,168,0.12);
    --border-hi: rgba(61,184,168,0.35);
    --glow:      rgba(61,184,168,0.18);
    --glow-hi:   rgba(61,184,168,0.45);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Inter', 'Rajdhani', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ── Ambient canvas background ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Radial ambient glow ── */
  .ambient {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 70% 50% at 50% 60%, rgba(61,184,168,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 20% 80%, rgba(0,229,200,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 30% 25% at 80% 20%, rgba(201,168,76,0.05) 0%, transparent 55%);
  }

  /* ── Grid overlay ── */
  .grid-overlay {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(61,184,168,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(61,184,168,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  }

  /* ── Scan line ── */
  .scanline {
    position: fixed;
    top: -100%;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(61,184,168,0.4), transparent);
    z-index: 1;
    animation: scanMove 6s linear infinite;
    pointer-events: none;
  }
  @keyframes scanMove {
    0%   { top: -2px; opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 0.6; }
    100% { top: 100%; opacity: 0; }
  }

  /* ── Corner brackets ── */
  .corner {
    position: fixed;
    width: 40px;
    height: 40px;
    z-index: 2;
    pointer-events: none;
    opacity: 0.25;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 20px; left: 20px; }
  .corner-tr { top: 20px; right: 20px; transform: scaleX(-1); }
  .corner-bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
  .corner-br { bottom: 20px; right: 20px; transform: scale(-1, -1); }

  /* ── Page wrapper ── */
  #wrapper {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  /* ── Login card ── */
  .login-card {
    width: 100%;
    max-width: 420px;
    background: linear-gradient(145deg, rgba(13,21,32,0.95), rgba(9,13,20,0.98));
    border: 1px solid var(--border-hi);
    border-radius: 20px;
    padding: 3rem 2.5rem 2.5rem;
    box-shadow:
      0 0 0 1px rgba(61,184,168,0.06),
      0 30px 80px rgba(0,0,0,0.8),
      0 0 60px rgba(61,184,168,0.08),
      inset 0 1px 0 rgba(255,255,255,0.04);
    animation: cardIn 0.8s cubic-bezier(0.4,0,0.2,1) both;
    position: relative;
    overflow: hidden;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: none; }
  }

  /* card top shimmer line */
  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    opacity: 0.6;
  }

  /* card ambient inner glow */
  .login-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(61,184,168,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── Logo ── */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 2.2rem;
    gap: 0;
  }

  .logo-hex {
    position: relative;
    width: 76px;
    height: 76px;
    margin-bottom: 1.2rem;
    animation: hexFloat 4s ease-in-out infinite;
  }
  @keyframes hexFloat {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-5px); }
  }

  .logo-hex svg { width: 100%; height: 100%; }

  .logo-hex .hex-glow {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(61,184,168,0.2) 0%, transparent 70%);
    animation: hexGlow 3s ease-in-out infinite;
  }
  @keyframes hexGlow {
    0%,100% { opacity: 0.5; transform: scale(1); }
    50%      { opacity: 1; transform: scale(1.15); }
  }

  .brand-wordmark {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 1.55rem;
    letter-spacing: 0.06em;
    color: var(--text);
    line-height: 1;
  }
  .brand-wordmark span { color: var(--accent2); }

  .brand-tagline {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ── Divider ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.8rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-hi));
  }
  .divider::after { background: linear-gradient(90deg, var(--border-hi), transparent); }
  .divider-text {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
    font-family: 'Rajdhani', sans-serif;
  }

  /* ── Auth section ── */
  .auth-info {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(61,184,168,0.05);
    border: 1px solid rgba(61,184,168,0.1);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    margin-bottom: 1.5rem;
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 0.03em;
  }
  .auth-info-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.8); }
  }

  /* ── Google button ── */
  .google-btn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 0.9rem 1.4rem;
    background: linear-gradient(135deg, rgba(255,255,255,0.96), rgba(240,240,255,0.96));
    color: #1a1a2e;
    font-size: 0.9rem;
    font-weight: 600;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .google-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 0%, rgba(61,184,168,0.08) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .google-btn:hover::before { transform: translateX(100%); }

  .google-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(61,184,168,0.35), 0 4px 20px rgba(0,0,0,0.4);
  }
  .google-btn:active { transform: translateY(0); }
  .google-btn svg { flex-shrink: 0; }

  /* ── Error box ── */
  #error-box {
    display: none;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    font-size: 0.8rem;
    color: var(--danger);
    margin-top: 1rem;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 0.03em;
    line-height: 1.5;
  }

  /* ── Footer note ── */
  .card-footer {
    text-align: center;
    margin-top: 1.8rem;
    font-size: 0.65rem;
    color: #2a3a46;
    letter-spacing: 0.15em;
    font-family: 'Rajdhani', monospace;
    text-transform: uppercase;
  }
  .card-footer span { color: rgba(61,184,168,0.4); }

  /* ── Loading state ── */
  #loading {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--bg);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
  }

  .loader-ring {
    position: relative;
    width: 56px;
    height: 56px;
  }
  .loader-ring svg {
    width: 100%; height: 100%;
    animation: ringRotate 1.2s linear infinite;
  }
  @keyframes ringRotate { to { transform: rotate(360deg); } }

  .loader-text {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    animation: textBlink 1.4s ease-in-out infinite;
  }
  @keyframes textBlink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }
</style>
</head>
<body>

<!-- Star field canvas script -->
<script>
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    const n = Math.floor((canvas.width * canvas.height) / 5000);
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.1 + 0.2,
        a: Math.random(),
        da: (Math.random() - 0.5) * 0.003,
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a += s.da;
      if (s.a > 1 || s.a < 0) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180, 220, 220, ${s.a * 0.5})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); initStars(); });
  resize();
  initStars();
  draw();
})();
</script>

<script>
// ════════════════════════════════════════════
//  ✏️  ONLY EDIT THIS — paste your Client ID
// ════════════════════════════════════════════
const GOOGLE_CLIENT_ID = "323501406243-6a2r6cf3n2k6bc896kpnfc6fv2a7vfq8.apps.googleusercontent.com";
// ════════════════════════════════════════════

const ALLOWED_DOMAIN = "casinomcw.com";
const SESSION_KEY    = "secure_auth_session";
const SESSION_DAYS   = 30;

function saveSession(user) {
  const expiry = Date.now() + SESSION_DAYS * 86400000;
  localStorage.setItem(SESSION_KEY, JSON.stringify({
    name: user.name, email: user.email, expiry, loginTime: Date.now()
  }));
}

function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (Date.now() > s.expiry) { localStorage.removeItem(SESSION_KEY); return null; }
    return s;
  } catch { return null; }
}

function showLoading() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('wrapper').style.display = 'none';
}
function hideLoading() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('wrapper').style.display = 'flex';
}

function showError(msg) {
  const box = document.getElementById('error-box');
  box.innerHTML = `<span style="margin-right:6px">⛔</span>${msg}`;
  box.style.display = 'block';
  hideLoading();
}

function startGoogleLogin() {
  document.getElementById('error-box').style.display = 'none';
  showLoading();
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleGoogleResponse,
    auto_select: false,
    cancel_on_tap_outside: true
  });
  google.accounts.id.prompt(notification => {
    if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
      showError("Sign-in popup was blocked or dismissed. Please try again.");
    }
  });
}

function handleGoogleResponse(response) {
  try {
    const parts   = response.credential.split('.');
    const payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
    const email   = (payload.email || '').trim().toLowerCase();
    const name    = payload.name || email;
    if (!email.endsWith('@' + ALLOWED_DOMAIN)) {
      showError("Access denied. This system is restricted to authorised accounts only.");
      return;
    }
    saveSession({ name, email });
    window.location.href = "index.html";
  } catch (e) {
    showError("Authentication failed. Please try again.");
    console.error(e);
  }
}

window.addEventListener('load', () => {
  if (loadSession()) window.location.href = "index.html";
});
</script>
