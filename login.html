<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RemarkHub · Secure Access</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #06070d;
    --surface: #0d0f1a;
    --surface2: #12152a;
    --border: rgba(255,255,255,0.06);
    --border-glow: rgba(99,102,241,0.35);
    --accent: #6366f1;
    --accent2: #818cf8;
    --accent3: #a5b4fc;
    --teal: #2dd4bf;
    --text: #f0f0ff;
    --muted: #6b7280;
    --muted2: #4b5563;
    --danger: #f87171;
    --radius: 16px;
    --glow: rgba(99,102,241,0.18);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ── Animated BG ── */
  .bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridDrift 20s linear infinite;
  }
  @keyframes gridDrift {
    0%   { transform: translateY(0); }
    100% { transform: translateY(48px); }
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.22;
    animation: orbFloat 8s ease-in-out infinite;
  }
  .orb1 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #6366f1, transparent 70%);
    top: -200px; left: -150px;
    animation-delay: 0s;
  }
  .orb2 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #2dd4bf, transparent 70%);
    bottom: -150px; right: -100px;
    animation-delay: -4s;
  }
  .orb3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #a78bfa, transparent 70%);
    top: 40%; left: 60%;
    opacity: 0.12;
    animation-delay: -2s;
  }
  @keyframes orbFloat {
    0%, 100% { transform: translateY(0) scale(1); }
    50%       { transform: translateY(-30px) scale(1.04); }
  }

  /* Shooting stars */
  .star-field {
    position: absolute;
    inset: 0;
  }
  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(255,255,255,0.6);
    border-radius: 50%;
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.1; transform: scale(1); }
    50%       { opacity: 0.9; transform: scale(1.5); }
  }

  /* Scan line */
  .scan-line {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(99,102,241,0.025) 50%,
      transparent 100%
    );
    background-size: 100% 8px;
    animation: scanMove 6s linear infinite;
    pointer-events: none;
  }
  @keyframes scanMove {
    from { background-position: 0 0; }
    to   { background-position: 0 100vh; }
  }

  /* ── Layout ── */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .login-wrap {
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    gap: 0;
    animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Brand block ── */
  .brand-block {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .brand-emblem {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .emblem-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid transparent;
    animation: ringPulse 3s ease-in-out infinite;
  }
  .emblem-ring:nth-child(1) {
    width: 90px; height: 90px;
    border-color: rgba(99,102,241,0.3);
    animation-delay: 0s;
  }
  .emblem-ring:nth-child(2) {
    width: 116px; height: 116px;
    border-color: rgba(99,102,241,0.15);
    animation-delay: 0.5s;
  }
  .emblem-ring:nth-child(3) {
    width: 142px; height: 142px;
    border-color: rgba(99,102,241,0.07);
    animation-delay: 1s;
  }
  @keyframes ringPulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.04); }
  }

  .emblem-core {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #4f46e5 0%, #6366f1 50%, #818cf8 100%);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 0 1px rgba(99,102,241,0.5),
      0 0 30px rgba(99,102,241,0.4),
      0 0 60px rgba(99,102,241,0.2),
      inset 0 1px 0 rgba(255,255,255,0.15);
    position: relative;
    z-index: 1;
    animation: corePulse 3s ease-in-out infinite;
  }
  @keyframes corePulse {
    0%, 100% { box-shadow: 0 0 0 1px rgba(99,102,241,0.5), 0 0 30px rgba(99,102,241,0.4), 0 0 60px rgba(99,102,241,0.2), inset 0 1px 0 rgba(255,255,255,0.15); }
    50%       { box-shadow: 0 0 0 1px rgba(99,102,241,0.7), 0 0 40px rgba(99,102,241,0.6), 0 0 80px rgba(99,102,241,0.3), inset 0 1px 0 rgba(255,255,255,0.15); }
  }

  .emblem-core svg {
    width: 34px; height: 34px;
  }

  .brand-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 0.4rem;
  }
  .brand-name .remark { color: var(--text); }
  .brand-name .hub    { color: var(--accent2); }

  .brand-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: var(--teal);
    text-transform: uppercase;
    opacity: 0.8;
  }

  /* ── Card ── */
  .auth-card {
    background: linear-gradient(160deg, rgba(13,15,26,0.95) 0%, rgba(17,20,38,0.95) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.2rem 2rem;
    backdrop-filter: blur(20px);
    box-shadow:
      0 0 0 1px rgba(99,102,241,0.08),
      0 24px 60px rgba(0,0,0,0.5),
      0 0 80px rgba(99,102,241,0.06);
    position: relative;
    overflow: hidden;
  }

  /* Card top shimmer line */
  .auth-card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(99,102,241,0.6), transparent);
  }

  /* Card corner accents */
  .auth-card::after {
    content: '';
    position: absolute;
    top: 12px; right: 12px;
    width: 28px; height: 28px;
    border-top: 1.5px solid rgba(99,102,241,0.3);
    border-right: 1.5px solid rgba(99,102,241,0.3);
    border-radius: 0 4px 0 0;
  }

  .card-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-label::before {
    content: '';
    display: block;
    width: 16px; height: 1px;
    background: rgba(99,102,241,0.5);
  }

  .card-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.5rem;
    letter-spacing: -0.01em;
  }

  .card-sub {
    font-size: 0.84rem;
    color: var(--muted);
    margin-bottom: 1.8rem;
    line-height: 1.5;
  }

  /* ── Google button ── */
  .google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 0.9rem 1.4rem;
    background: rgba(255,255,255,0.96);
    color: #111827;
    font-family: 'Inter', sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
    position: relative;
    overflow: hidden;
    letter-spacing: 0.01em;
  }
  .google-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(99,102,241,0.07), rgba(45,212,191,0.07));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .google-btn:hover {
    transform: translateY(-2px);
    box-shadow:
      0 8px 24px rgba(0,0,0,0.3),
      0 0 0 1px rgba(99,102,241,0.3),
      0 0 20px rgba(99,102,241,0.15);
  }
  .google-btn:hover::before { opacity: 1; }
  .google-btn:active { transform: translateY(0); }

  /* ── Divider ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 1.5rem 0;
    color: var(--muted2);
    font-size: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.08em;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Domain badge ── */
  .domain-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(45,212,191,0.06);
    border: 1px solid rgba(45,212,191,0.2);
    border-radius: 10px;
    padding: 0.65rem 1rem;
    font-size: 0.8rem;
  }
  .domain-dot {
    width: 7px; height: 7px;
    background: var(--teal);
    border-radius: 50%;
    animation: dotPulse 2s ease-in-out infinite;
    flex-shrink: 0;
    box-shadow: 0 0 8px rgba(45,212,191,0.6);
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.6; transform: scale(0.85); }
  }
  .domain-text { color: var(--muted); }
  .domain-text strong { color: var(--teal); font-family: 'JetBrains Mono', monospace; font-weight: 500; }

  /* ── Error ── */
  #error-box {
    display: none;
    background: rgba(248,113,113,0.07);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: 10px;
    padding: 0.85rem 1rem;
    font-size: 0.83rem;
    color: var(--danger);
    margin-top: 1rem;
    line-height: 1.5;
  }

  /* ── Loading state ── */
  #login-page { transition: opacity 0.3s; }
  #loading {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(6,7,13,0.9);
    backdrop-filter: blur(12px);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    color: var(--muted);
    font-size: 0.88rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }
  .spinner-wrap {
    position: relative;
    width: 52px; height: 52px;
  }
  .spinner-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid transparent;
    animation: spinRing 1s linear infinite;
  }
  .spinner-ring:nth-child(1) {
    border-top-color: var(--accent);
    animation-duration: 0.9s;
  }
  .spinner-ring:nth-child(2) {
    inset: 6px;
    border-top-color: var(--teal);
    animation-duration: 1.3s;
    animation-direction: reverse;
  }
  @keyframes spinRing { to { transform: rotate(360deg); } }

  /* ── Footer ── */
  .login-footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.7rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted2);
    letter-spacing: 0.06em;
  }
  .login-footer span { color: rgba(99,102,241,0.5); }
</style>
</head>
<body>

<!-- BG -->
<div class="bg-canvas">
  <div class="bg-grid"></div>
  <div class="star-field" id="starField"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="scan-line"></div>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="spinner-wrap">
    <div class="spinner-ring"></div>
    <div class="spinner-ring"></div>
  </div>
  <span>VERIFYING ACCESS…</span>
</div>

<!-- PAGE -->
<div class="page" id="login-page">
  <div class="login-wrap">

    <!-- Brand -->
    <div class="brand-block">
      <div class="brand-emblem">
        <div class="emblem-ring"></div>
        <div class="emblem-ring"></div>
        <div class="emblem-ring"></div>
        <div class="emblem-core">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
      </div>
      <div class="brand-name">
        <span class="remark">Remark</span><span class="hub">Hub</span>
      </div>
      <div class="brand-tag">Risk Intelligence Panel · v2.1</div>
    </div>

    <!-- Card -->
    <div class="auth-card">
      <div class="card-label">Authentication Required</div>
      <div class="card-title">Secure Sign In</div>
      <div class="card-sub">Use your organization Google account to access the RS Team panel.</div>

      <button class="google-btn" onclick="startGoogleLogin()">
        <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider">RESTRICTED ACCESS</div>

      <div class="domain-badge">
        <div class="domain-dot"></div>
        <div class="domain-text">
          Authorized domain: <strong>@casinomcw.com</strong>
        </div>
      </div>

      <div id="error-box"></div>
    </div>

    <div class="login-footer">
      REMARKHUB · RS TEAM · <span>INTERNAL USE ONLY</span>
    </div>

  </div>
</div>

<script>
const GOOGLE_CLIENT_ID = "323501406243-6a2r6cf3n2k6bc896kpnfc6fv2a7vfq8.apps.googleusercontent.com";
const ALLOWED_DOMAIN   = "casinomcw.com";
const SESSION_KEY      = "secure_auth_session";
const SESSION_DAYS     = 30;

function saveSession(user) {
  const expiry = Date.now() + SESSION_DAYS * 86400000;
  localStorage.setItem(SESSION_KEY, JSON.stringify({
    name: user.name, email: user.email,
    expiry, loginTime: Date.now()
  }));
}

function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (Date.now() > s.expiry) { localStorage.removeItem(SESSION_KEY); return null; }
    return s;
  } catch { return null; }
}

function show(id, flex) {
  document.getElementById(id).style.display = flex ? 'flex' : 'block';
}
function hide(id) { document.getElementById(id).style.display = 'none'; }

function showError(msg) {
  const box = document.getElementById('error-box');
  box.innerHTML = '⛔ &nbsp;' + msg;
  box.style.display = 'block';
  hide('loading');
  show('login-page');
}

function startGoogleLogin() {
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('login-page').style.opacity = '0.4';
  show('loading', true);

  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleGoogleResponse,
    auto_select: false,
    cancel_on_tap_outside: true
  });

  google.accounts.id.prompt(n => {
    if (n.isNotDisplayed() || n.isSkippedMoment()) {
      document.getElementById('login-page').style.opacity = '1';
      showError("Sign-in popup was blocked or dismissed. Please try again.");
    }
  });
}

function handleGoogleResponse(response) {
  try {
    const parts   = response.credential.split('.');
    const payload = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
    const email   = (payload.email || '').trim().toLowerCase();
    const name    = payload.name || email;

    if (!email.endsWith('@' + ALLOWED_DOMAIN)) {
      showError("Access denied. You are not authorised to access this system.");
      return;
    }

    saveSession({ name, email });
    window.location.href = "index.html";
  } catch(e) {
    showError("Authentication failed. Please try again.");
    console.error(e);
  }
}

window.addEventListener('load', () => {
  // Generate stars
  const sf = document.getElementById('starField');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left: ${Math.random()*100}%;
      top: ${Math.random()*100}%;
      --dur: ${2 + Math.random()*4}s;
      --delay: ${-Math.random()*4}s;
      width: ${Math.random() < 0.3 ? 3 : 2}px;
      height: ${Math.random() < 0.3 ? 3 : 2}px;
    `;
    sf.appendChild(s);
  }

  const session = loadSession();
  if (session) { window.location.href = "index.html"; }
});
</script>
</body>
</html>
