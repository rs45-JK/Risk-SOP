<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemarkHub | Risk Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@700;800&display=swap');

        :root {
            --bg: #0f1318;
            --bg2: #151c24;
            --card: #1a2130;
            --card-hover: #1e2838;
            --accent: #3db8a8;
            --accent2: #2e9e90;
            --accent-dim: rgba(61, 184, 168, 0.1);
            --accent-glow: rgba(61, 184, 168, 0.18);
            --text-main: #c8d3dc;
            --text-dim: #566370;
            --text-mid: #6e7f8d;
            --input-bg: #0f1318;
            --border: #1e2730;
            --border-accent: rgba(61, 184, 168, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(61,184,168,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(61,184,168,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
            animation: gridPulse 8s ease-in-out infinite;
        }

        @keyframes gridPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Ambient glow orb */
        body::after {
            content: '';
            position: fixed;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(61,184,168,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 12s ease-in-out infinite;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(-40px, 30px); }
            66% { transform: translate(20px, -20px); }
        }

        /* Quick Copy Bar */
        .quick-bar {
            background: var(--bg2);
            padding: 10px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid var(--border);
            max-height: 56px;
            overflow: hidden;
            opacity: 1;
            transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease, padding 0.35s ease;
            position: relative;
            z-index: 5;
        }

        .quick-bar.hidden-bar {
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .quick-input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 9px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.25s;
            font-family: 'Inter', sans-serif;
        }

        .quick-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim), 0 0 16px var(--accent-glow);
            background: var(--bg2);
        }

        .quick-input::placeholder { color: var(--text-dim); }

        .quick-copy-btn {
            background: var(--accent);
            color: #0d1117;
            border: none;
            padding: 9px 22px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            font-size: 0.82rem;
            transition: all 0.2s;
            letter-spacing: 1px;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .quick-copy-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .quick-copy-btn:hover::after { opacity: 1; }
        .quick-copy-btn:hover {
            background: #4ecfbc;
            box-shadow: 0 0 12px var(--accent-glow), 0 4px 12px rgba(0,0,0,0.3);
            transform: translateY(-1px);
        }
        .quick-copy-btn:active { transform: translateY(0) scale(0.97); }

        /* Header */
        header {
            background: var(--bg2);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            position: relative;
            z-index: 5;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }

        /* Hamburger */
        .hamburger-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-mid);
            font-size: 1rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            line-height: 1;
            transition: all 0.2s;
        }

        .hamburger-btn:hover {
            color: var(--accent);
            border-color: var(--border-accent);
            background: var(--accent-dim);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* LOGO — cool new design */
        .logo-box {
            display: inline-flex;
            align-items: center;
            gap: 0;
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
            position: relative;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            box-shadow: 0 0 14px var(--accent-glow);
            animation: logoPulse 3s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 8px var(--accent-glow); }
            50% { box-shadow: 0 0 16px rgba(61,184,168,0.35); }
        }

        .logo-icon svg {
            width: 16px; height: 16px;
            fill: #0d1117;
        }

        .logo-remark {
            color: var(--text-main);
            font-weight: 700;
        }

        .logo-hub {
            color: var(--accent);
            font-weight: 900;
            position: relative;
        }

        .logo-hub::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0; right: 0;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
            box-shadow: 0 0 6px var(--accent);
        }

        .logo-dot {
            width: 5px; height: 5px;
            background: var(--accent);
            border-radius: 50%;
            margin: 0 1px 0 2px;
            box-shadow: 0 0 6px var(--accent);
            animation: dotBlink 2s ease-in-out infinite;
            align-self: flex-end;
            margin-bottom: 4px;
        }

        @keyframes dotBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Side Overlay */
        .side-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 200;
            animation: fadeIn 0.2s ease;
        }
        .side-overlay.active { display: block; }

        /* Side Panel — iframe shell */
        .side-panel {
            position: fixed;
            top: 0; left: 0;
            width: 272px;
            height: 100%;
            background: #0d1117;
            border-right: 1px solid var(--border);
            z-index: 201;
            display: flex;
            flex-direction: column;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 12px 0 40px rgba(0,0,0,0.7);
            overflow: hidden;
        }

        .side-panel.active { transform: translateX(0); }

        .side-panel iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            display: block;
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            align-items: stretch;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 5;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            color: var(--text-dim);
            border: none;
            padding: 13px 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.25s;
            position: relative;
            border-bottom: 2px solid transparent;
            font-family: 'Inter', sans-serif;
        }

        .tab-btn:hover { color: var(--text-main); }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-btn.active::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        /* RS Inline Input — in tab nav, left of TG Chat */
        .rs-inline {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0 10px;
            border-right: 1px solid var(--border);
            height: 100%;
            overflow: hidden;
            max-width: 100px;
            opacity: 1;
            transition: max-width 0.3s cubic-bezier(0.4,0,0.2,1),
                        opacity 0.25s ease,
                        padding 0.3s ease,
                        border-color 0.3s ease;
        }

        .rs-inline.rs-hidden {
            max-width: 0;
            opacity: 0;
            padding: 0;
            border-right-color: transparent;
        }

        .rs-inline-label {
            color: var(--accent);
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .rs-inline-input {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 4px 6px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: 700;
            outline: none;
            width: 38px;
            text-align: center;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .rs-inline-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-dim);
            width: 50px;
        }

        .rs-inline-input::placeholder { color: var(--text-dim); font-weight: 400; }

        /* Main Content */
        .content-wrapper {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: none;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) var(--bg);
            scroll-behavior: smooth;
        }

        .tab-content.active { display: block; }

        .list-wrapper {
            max-width: 620px;
            margin: 0 auto;
            width: 100%;
        }

        /* Remark Item */
        .remark-item {
            background: var(--card);
            margin-bottom: 10px;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            gap: 12px;
            align-items: flex-start;
            opacity: 0;
            transform: translateY(12px);
            animation: itemIn 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            position: relative;
            overflow: hidden;
        }

        .remark-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .remark-item:hover::before { opacity: 1; }

        .remark-item:hover {
            border-color: var(--border-accent);
            background: var(--card-hover);
            box-shadow: 0 4px 20px rgba(0,229,200,0.08), 0 0 0 1px var(--border-accent);
            transform: translateY(-2px);
        }

        @keyframes itemIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .remark-text {
            font-size: 0.92rem;
            line-height: 1.55;
            word-break: break-word;
            color: var(--text-main);
            flex: 1;
        }

        /* Copy Button */
        .copy-btn {
            background: var(--accent);
            color: #0d1117;
            border: none;
            padding: 7px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
            transition: all 0.2s;
            flex-shrink: 0;
            letter-spacing: 0.8px;
            align-self: flex-start;
            margin-top: 2px;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .copy-btn::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s, opacity 0.4s;
            opacity: 0;
        }

        .copy-btn.ripple::after {
            width: 150px; height: 150px;
            opacity: 0;
        }

        .copy-btn:hover {
            background: #4ecfbc;
            box-shadow: 0 0 8px var(--accent-glow);
            transform: translateY(-1px);
        }

        .copy-btn:active { transform: scale(0.95); }

        .copy-btn.copied {
            background: #1a6b5f;
            color: var(--accent);
        }

        /* Footer */
        .footer {
            text-align: center;
            color: #2a3040;
            font-size: 0.72rem;
            letter-spacing: 1px;
            padding: 18px 0 8px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
            user-select: none;
        }
        .footer.visible { opacity: 1; transform: translateY(0); }

        /* Add Button */
        .add-btn-floating {
            position: fixed;
            bottom: 24px; right: 24px;
            width: 52px; height: 52px;
            background: var(--accent);
            color: #0d1117;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px var(--accent-glow);
            z-index: 50;
            font-weight: bold;
            animation: fabPulse 3s ease-in-out infinite;
        }

        @keyframes fabPulse {
            0%, 100% { box-shadow: 0 4px 16px var(--accent-glow); }
            50% { box-shadow: 0 4px 22px rgba(61,184,168,0.3), 0 0 0 6px rgba(61,184,168,0.06); }
        }

        .add-btn-floating:hover {
            background: #4ecfbc;
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 6px 22px rgba(61,184,168,0.35);
            animation: none;
        }

        .add-btn-floating:active { transform: scale(0.95); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal {
            background: var(--card);
            border: 1px solid var(--border-accent);
            border-radius: 14px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 24px 64px rgba(0,0,0,0.8), 0 0 24px rgba(61,184,168,0.07);
            animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-title {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-main);
        }

        .modal-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 16px;
            outline: none;
            resize: vertical;
            min-height: 60px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .modal-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim), 0 0 16px var(--accent-glow);
        }

        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }

        .modal-btn {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .modal-btn-save {
            background: var(--accent);
            color: #0d1117;
        }
        .modal-btn-save:hover {
            background: #4ecfbc;
            box-shadow: 0 0 10px var(--accent-glow);
            transform: translateY(-1px);
        }

        .modal-btn-cancel {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
        }
        .modal-btn-cancel:hover { background: var(--border); color: var(--text-main); }

        /* Toast */
        #toast {
            visibility: hidden;
            position: fixed;
            bottom: 100px; left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #0d1117;
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.82rem;
            z-index: 999;
            box-shadow: 0 4px 24px var(--accent-glow);
            letter-spacing: 0.5px;
        }

        #toast.show {
            visibility: visible;
            animation: toastPop 0.3s ease forwards;
        }

        @keyframes toastPop {
            from { opacity: 0; transform: translate(-50%, 12px) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, 0) scale(1); }
        }

        .credit-name { color: var(--accent); font-weight: 600; }

        .empty-state {
            text-align: center;
            color: var(--text-dim);
            padding: 60px 20px;
            font-size: 0.9rem;
        }
        .empty-state-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }

        /* INPUT FIELDS */
        .input-section { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .input-label { color: var(--text-main); font-size: 0.9rem; font-weight: 500; white-space: nowrap; }

        .inline-input {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.88rem;
            outline: none;
            transition: all 0.2s;
            height: 36px;
            font-family: 'Inter', sans-serif;
        }

        .inline-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-dim), 0 0 8px var(--accent-glow);
            background: var(--bg2);
        }

        .inline-input::placeholder { color: var(--text-dim); }
        .input-amount { width: 100px; }
        .input-username { width: 110px; }
        .input-identifier { width: 70px; }
        .amount-display { color: var(--accent); font-weight: 700; min-width: 50px; }

        .inline-select {
            background: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
            height: 36px;
            font-family: 'Inter', sans-serif;
        }

        .inline-select:hover { border-color: var(--accent); }
        .inline-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-dim);
            background: var(--bg2);
        }
        .inline-select option { background: var(--card); color: var(--text-main); }

        .separator { color: var(--text-mid); font-weight: 600; margin: 0 2px; line-height: 36px; height: 36px; }
        .cdf-section { display: flex; flex-direction: column; gap: 10px; }
        .cdf-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

        .cdf-preview {
            font-size: 0.8rem;
            color: var(--accent);
            margin-top: 8px;
            padding: 8px 10px;
            background: rgba(0,229,200,0.05);
            border-left: 2px solid var(--accent);
            border-radius: 4px;
            line-height: 1.4;
        }

        /* Scan line animation on items */
        .remark-item.flash::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(0,229,200,0.15), transparent);
            animation: scanLine 0.5s ease forwards;
            pointer-events: none;
        }

        @keyframes scanLine {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }

        /* Stagger animation delay for list items */
        .remark-item:nth-child(1) { animation-delay: 0.03s; }
        .remark-item:nth-child(2) { animation-delay: 0.06s; }
        .remark-item:nth-child(3) { animation-delay: 0.09s; }
        .remark-item:nth-child(4) { animation-delay: 0.12s; }
        .remark-item:nth-child(5) { animation-delay: 0.15s; }
        .remark-item:nth-child(6) { animation-delay: 0.18s; }
        .remark-item:nth-child(7) { animation-delay: 0.21s; }
        .remark-item:nth-child(8) { animation-delay: 0.24s; }
        .remark-item:nth-child(9) { animation-delay: 0.27s; }
        .remark-item:nth-child(10) { animation-delay: 0.30s; }
        .remark-item:nth-child(11) { animation-delay: 0.33s; }
        .remark-item:nth-child(12) { animation-delay: 0.36s; }
    </style>
</head>
<body>
<script>
  (function() {
    const SESSION_KEY = "secure_auth_session";
    try {
      const raw = localStorage.getItem(SESSION_KEY);
      if (!raw) { window.location.replace("login.html"); return; }
      const s = JSON.parse(raw);
      if (Date.now() > s.expiry) {
        localStorage.removeItem(SESSION_KEY);
        window.location.replace("login.html");
      }
    } catch(e) {
      window.location.replace("login.html");
    }
  })();
</script>

<script>
    const data = {
        tg: [
            "Checking team - rs__",
            "On it team. Thanks - rs__",
            "Done team. Thanks - rs__",
            "Verified team. Thanks - rs__",
            "Rejected team. Thanks - rs__",
            "For Further Checking - rs__",
            "Hi team this account is for further review thanks — rs__",
            "Hi team as per checking account is for adjustment will be back to active status once adjustment is done. Thank you — rs__",
            "Confirmed fraud activity, cannot back to active as per our superior's instructions, Thanks - rs__",
            "Hi team upon checking this account is  Suspicious betting activities, account under review by Sports Provider and withdrawal on hold until 19th May-2026. Thank you - rs__",
            "Hi team upon checking this account is for further checking. Wait for our superior decision. Thank you - rs__",
        ],
        risk: [
            "Deposit Required",
            "AB Bet. Invalid Turnover: ",
            "Active Bonus Invalid TO, Need to reach : ",
            "CDF - Chip Dumping Fraud With -",
            "MAC - Multiple Account Creation-",
            "HBF - PG Hide Balance Fraud",
            "RAF - RAF Bonus Abuser -",
            "SUSPICIOUS In Out Fund",
            "Suspicious bets in Bookmaker Market-SOCCER",
            "Suspicious Taixiu winning",
            "Suspicious Fund in Fund out in EVOLUTION Fan Tan",
            "Suspicious Sports Hedging",
            "Suspicious Cricket Sports Bets",
            "Suspicious CF winning",
            "Suspicious Deposit ",
            "Slots FDB Abuser ",
        ]
    };

    let currentTab = 'tg';
    const toast = document.getElementById('toast');
    const quickInput = document.getElementById('quickInput');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalInput = document.getElementById('modalInput');
    const modalTitle = document.getElementById('modalTitle');

    function switchTab(tab, event) {
        currentTab = tab;
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
        event.target.classList.add('active');
        const rsWidget = document.getElementById('tgInputBar');
        if (tab === 'tg-chat') rsWidget.classList.remove('rs-hidden');
        else rsWidget.classList.add('rs-hidden');
    }

    function notify(msg = "Copied!") {
        toast.textContent = msg;
        toast.classList.remove('show');
        void toast.offsetWidth;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1400);
    }

    function copyText(text) {
        navigator.clipboard.writeText(text).then(() => notify("✓ Copied!"));
    }

    function quickCopy() {
        const text = quickInput.value.trim();
        if (text) {
            copyText(text);
            quickInput.value = "";
            quickInput.focus();
        }
    }

    quickInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') quickCopy();
    });

    function triggerCopyBtn(btn, textFn) {
        // Ripple + flash
        btn.classList.add('ripple');
        const item = btn.closest('.remark-item');
        if (item) {
            item.classList.remove('flash');
            void item.offsetWidth;
            item.classList.add('flash');
            setTimeout(() => item.classList.remove('flash'), 500);
        }
        btn.classList.add('copied');
        btn.textContent = '✓';
        setTimeout(() => {
            btn.classList.remove('copied', 'ripple');
            btn.textContent = 'Copy';
        }, 1200);
        textFn();
    }

    function renderList(type) {
        const listEl = document.getElementById(`${type}-list`);
        const items = data[type];

        if (items.length === 0) {
            listEl.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📭</div><p>No items. Tap + to add one!</p></div>`;
            return;
        }

        listEl.innerHTML = items.map((text, idx) => {
            if (text.includes("AB Bet. Invalid Turnover:")) {
                return `
                <div class="remark-item">
                    <div class="input-section">
                        <div class="input-row">
                            <span class="input-label">AB Bet. Invalid Turnover:</span>
                            <input type="text" id="abBetInput" class="inline-input input-amount" placeholder="0.00" oninput="updateABBetAmount()">
                            <span id="abBetAmount" class="amount-display"></span>
                        </div>
                    </div>
                    <button class="copy-btn" onclick="triggerCopyBtn(this, copyABBetText)">Copy</button>
                </div>`;
            }
            if (text.includes("Active Bonus Invalid TO, Need to reach :")) {
                return `
                <div class="remark-item">
                    <div class="input-section">
                        <div class="input-row">
                            <span class="input-label">Active Bonus Invalid TO, Need to reach:</span>
                            <input type="text" id="activeBonusInput" class="inline-input input-amount" placeholder="0.00" oninput="updateActiveBonusAmount()">
                            <span id="activeBonusAmount" class="amount-display"></span>
                        </div>
                    </div>
                    <button class="copy-btn" onclick="triggerCopyBtn(this, copyActiveBonusText)">Copy</button>
                </div>`;
            }
            if (text.includes("CDF - Chip Dumping Fraud With -")) {
                return `
                <div class="remark-item">
                    <div class="input-section">
                        <div class="cdf-section">
                            <div class="cdf-row">
                                <span class="input-label">CDF - Chip Dumping Fraud With:</span>
                                <input type="text" id="cdfUsernameInput" class="inline-input input-username" placeholder="UserName" oninput="updateCDFText()">
                                <span class="separator">(</span>
                                <input type="text" id="cdfM1Input" class="inline-input input-identifier" placeholder="M1" oninput="updateCDFText()">
                                <span class="separator">)</span>
                            </div>
                            <div class="cdf-row">
                                <span class="input-label">in</span>
                                <select id="cdfPlatformDropdown" class="inline-select" style="width:140px" onchange="updateCDFText()">
                                    <option value="">-- Platform --</option>
                                    <option value="EVOLUTION">EVOLUTION</option>
                                    <option value="SEXYBCRT">SEXYBCRT</option>
                                    <option value="KINGMAKER">KINGMAKER</option>
                                    <option value="PP">PP</option>
                                </select>
                                <span class="separator">/</span>
                                <select id="cdfGameDropdown" class="inline-select" style="width:140px" onchange="updateCDFText()">
                                    <option value="">-- Game --</option>
                                    <option value="Bac Bo">Bac Bo</option>
                                    <option value="Baccarat">Baccarat</option>
                                    <option value="Roulette">Roulette</option>
                                </select>
                            </div>
                            <div class="cdf-row"><span class="input-label">/ Suspicious In Out Fund</span></div>
                            <div id="cdfPreview" class="cdf-preview"></div>
                        </div>
                    </div>
                    <button class="copy-btn" onclick="triggerCopyBtn(this, copyCDFText)">Copy</button>
                </div>`;
            }
            return `
            <div class="remark-item">
                <span class="remark-text">${text}</span>
                <button class="copy-btn" onclick="triggerCopyBtn(this, () => copyText('${text.replace(/'/g, "\\'")}'))">Copy</button>
            </div>`;
        }).join('');
    }

    function updateABBetAmount() {
        const input = document.getElementById('abBetInput');
        const display = document.getElementById('abBetAmount');
        if (!input || !display) return;
        display.textContent = input.value.trim();
    }

    function copyABBetText() {
        const amount = document.getElementById('abBetAmount')?.textContent || '';
        if (!amount) { notify("No amount set!"); return; }
        let formattedAmount = amount;
        const num = parseFloat(amount.replace(/,/g, ''));
        if (!isNaN(num)) formattedAmount = num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        copyText(`AB Bet. Invalid Turnover: ${formattedAmount}`);
    }

    function updateActiveBonusAmount() {
        const input = document.getElementById('activeBonusInput');
        const display = document.getElementById('activeBonusAmount');
        if (!input || !display) return;
        display.textContent = input.value.trim();
    }

    function copyActiveBonusText() {
        const amount = document.getElementById('activeBonusAmount')?.textContent || '';
        if (!amount) { notify("No amount set!"); return; }
        let formattedAmount = amount;
        const num = parseFloat(amount.replace(/,/g, ''));
        if (!isNaN(num)) formattedAmount = num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        copyText(`Active Bonus Invalid TO, Need to reach : ${formattedAmount}`);
    }

    function updateCDFText() {
        const username = document.getElementById('cdfUsernameInput')?.value.trim() || '';
        const m1 = document.getElementById('cdfM1Input')?.value.trim() || '';
        const platform = document.getElementById('cdfPlatformDropdown')?.value || '';
        const game = document.getElementById('cdfGameDropdown')?.value || '';
        const preview = document.getElementById('cdfPreview');
        if (!preview) return;
        let t = 'CDF - Chip Dumping Fraud With -';
        if (username) { t += ` ${username}`; if (m1) t += `(${m1})`; }
        if (platform || game) { t += ' in'; if (platform) t += ` ${platform}`; if (game) t += `/${game}`; }
        t += ' / Suspicious In Out Fund';
        preview.textContent = '✓ Preview: ' + t;
    }

    function copyCDFText() {
        const username = document.getElementById('cdfUsernameInput')?.value.trim() || '';
        const m1 = document.getElementById('cdfM1Input')?.value.trim() || '';
        const platform = document.getElementById('cdfPlatformDropdown')?.value || '';
        const game = document.getElementById('cdfGameDropdown')?.value || '';
        let text = 'CDF - Chip Dumping Fraud With -';
        if (username) { text += ` ${username}`; if (m1) text += `(${m1})`; }
        if (platform || game) { text += ' in'; if (platform) text += ` ${platform}`; if (game) text += `/${game}`; }
        text += ' / Suspicious In Out Fund';
        copyText(text);
    }

    function openModal() {
        modalTitle.textContent = "Add New Item";
        modalInput.value = "";
        modalOverlay.classList.add('active');
        setTimeout(() => modalInput.focus(), 100);
    }

    function closeModal(event) {
        if (event && event.target !== modalOverlay) return;
        modalOverlay.classList.remove('active');
    }

    function saveItem() {
        const text = modalInput.value.trim();
        if (!text) { notify("Please enter text!"); return; }
        if (data[currentTab]) {
            data[currentTab].push(text);
            notify("✓ Added!");
            renderList(currentTab);
            modalOverlay.classList.remove('active');
        }
    }

    modalInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && e.ctrlKey) saveItem();
    });

    const TG_TEMPLATES = [
        "Checking team - rs__",
        "On it team. Thanks - rs__",
        "Done team. Thanks - rs__",
        "Verified team. Thanks - rs__",
        "Rejected team. Thanks - rs__",
        "For Further Checking - rs__",
        "Hi team this account is for further review thanks — rs__",
        "Hi team as per checking account is for adjustment will be back to active status once adjustment is done. Thank you — rs__",
        "Confirmed fraud activity, cannot back to active as per our superior's instructions, Thanks - rs__",
        "Hi team upon checking this account is  Suspicious betting activities, account under review by Sports Provider and withdrawal on hold until 19th May-2026. Thank you - rs__",
        "Hi team upon checking this account is for further checking. Wait for our superior decision. Thank you - rs__",
    ];

    function updateTGNumbers() {
        const input = document.getElementById('tgNumberInput');
        const numberInput = input.value.trim();
        const number = numberInput ? `rs${numberInput}` : 'rs__';
        data.tg = TG_TEMPLATES.map(t => t.replace(/rs__/g, number));
        if (currentTab === 'tg') renderList('tg');
    }

    renderList('tg');
    renderList('risk');

    // Scroll handler
    const quickBar = document.querySelector('.quick-bar');
    let lastScrollY = 0;

    function handleScroll() {
        const activeContent = document.querySelector('.tab-content.active');
        if (!activeContent) return;
        const scrollY = activeContent.scrollTop;
        if (scrollY > 10) quickBar.classList.add('hidden-bar');
        else quickBar.classList.remove('hidden-bar');
        const atBottom = activeContent.scrollHeight - scrollY - activeContent.clientHeight < 24;
        const footer = activeContent.querySelector('.footer');
        if (footer) {
            if (atBottom) footer.classList.add('visible');
            else footer.classList.remove('visible');
        }
        lastScrollY = scrollY;
    }

    document.querySelectorAll('.tab-content').forEach(el => {
        el.addEventListener('scroll', handleScroll, { passive: true });
    });

    function switchTabFromMenu(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b => {
            if (b.getAttribute('onclick') && b.getAttribute('onclick').includes(tab)) b.classList.add('active');
        });
        const rsWidget = document.getElementById('tgInputBar');
        if (tab === 'tg-chat') rsWidget.classList.remove('rs-hidden');
        else rsWidget.classList.add('rs-hidden');
        document.getElementById('sidePanel').classList.remove('active');
        document.getElementById('sideOverlay').classList.remove('active');
    }

    function toggleSidePanel() {
        document.getElementById('sidePanel').classList.toggle('active');
        document.getElementById('sideOverlay').classList.toggle('active');
    }

    // Listen for commands from nav-panel.html iframe
    window.addEventListener('message', function(e) {
        const d = e.data;
        if (!d || !d.type) return;
        if (d.type === 'close-panel') {
            document.getElementById('sidePanel').classList.remove('active');
            document.getElementById('sideOverlay').classList.remove('active');
        } else if (d.type === 'switch-tab' && d.tab) {
            switchTabFromMenu(d.tab);
        } else if (d.type === 'open-url' && d.url) {
            window.open(d.url, '_blank');
        } else if (d.type === 'open-page' && d.file) {
            // Navigate to the registered page file
            window.location.href = d.file;
        }
    });
</script>

</body>
